# ============================================================
# data-master 配置文件
# 修改此文件即可调整所有运行参数，无需改动代码
# ============================================================

# ── 意图分类标签 ──────────────────────────────────────────
# 合法的 output 列取值，校验时会检查是否在此列表内
valid_labels:
  - 寿险意图
  - 拒识

# ── 系统提示词 ───────────────────────────────────────────
# 写入每条 JSONL 的 system message，影响模型微调时的角色定位
system_prompt: "你是一个意图分类模型，只能输出：寿险意图 或 拒识"

# ── 数据列名 & 前缀 ────────────────────────────────────────
# input / output 对应 Excel 中的列标题
# input_prefix：追加在每条 input 文本前面的固定前缀，留空则不追加
# 例如：input_prefix: "请判断以下文本的意图：\n"
columns:
  input: input
  output: output
  input_prefix: ""

# ── 数据集划分比例 ────────────────────────────────────────
# train + val + test 必须等于 1.0
# random_seed 固定后，每次划分结果一致（可复现）
split:
  train: 0.8
  val: 0.1
  test: 0.1
  random_seed: 42

# ── 路径配置（相对于项目根目录） ──────────────────────────
# 通常不需要修改；也可通过环境变量 DATA_RAW_DIR 等覆盖
paths:
  raw: data/raw
  processed: data/processed
  output: data/output

# ── 输出格式 ──────────────────────────────────────────────
# preset 指定内置格式名称，切换平台时只需改这一行：
#
#   openai    : messages + user/assistant 角色（OpenAI / LLaMA-Factory 标准）
#   internal  : conversations + human/assistant 角色 + 自增 id（内部平台）
#
# 也可通过命令行参数临时覆盖：--format openai
output_format:
  preset: internal
