# ============================================================
# data-master 配置文件
# 修改此文件即可调整所有运行参数，无需改动代码
# ============================================================

# ── 意图分类标签 ──────────────────────────────────────────
# 合法的 output 列取值，校验时会检查是否在此列表内
valid_labels:
  - 寿险意图
  - 拒识

# ── 系统提示词 ───────────────────────────────────────────
# 写入每条 JSONL 的 system message，影响模型微调时的角色定位
system_prompt: "你是一个意图分类模型，只能输出：寿险意图 或 拒识"

# ── 数据列名 & 前缀 ────────────────────────────────────────
# input / output 对应 Excel 中的列标题
# input_prefix：追加在每条 input 文本前面的固定前缀，留空则不追加
# 例如：input_prefix: "请判断以下文本的意图：\n"
columns:
  input: input
  output: output
  input_prefix: ""

# ── 数据集划分比例 ────────────────────────────────────────
# train + val + test 必须等于 1.0
# random_seed 固定后，每次划分结果一致（可复现）
split:
  train: 0.8
  val: 0.1
  test: 0.1
  random_seed: 42

# ── 路径配置（相对于项目根目录） ──────────────────────────
# 通常不需要修改；也可通过环境变量 DATA_RAW_DIR 等覆盖
paths:
  raw: data/raw
  processed: data/processed
  output: data/output

# ── 输出格式 ──────────────────────────────────────────────
# preset 指定内置格式名称，切换平台时只需改这一行：
#
#   openai    : messages + user/assistant 角色（OpenAI / LLaMA-Factory 标准）
#   internal  : conversations + human/assistant 角色 + 自增 id（内部平台）
#   ark       : 平铺 JSON 数组，含 instruction 字段（Ark 平台）
#
# 也可通过命令行参数临时覆盖：--format openai
output_format:
  preset: internal

# ── 语义冲突检测配置 ───────────────────────────────────────
# 用于 run_conflict_detection.py：检测新增拒识数据中与寿险意图
# 语义高度相似的样本（潜在标注错误或污染数据）
conflict_detection:

  embedding:
    # 本地 SentenceTransformer 模型路径（必填，不能依赖外网）
    # 示例（Windows）：D:/models/bge-base-zh
    # 示例（macOS）  ：/Users/kris/models/bge-base-zh
    model_path: ""
    # 每批编码的文本数，内存不足时调小
    batch_size: 64
    # 寿险意图 embedding 缓存路径（首次运行后自动保存，下次直接复用）
    cache_path: "data/cache/life_embeddings.npy"

  faiss:
    # 检索最近邻数（1 = 只返回最相似的 1 条寿险样本）
    # 调大可在输出中看到多条参考，便于人工核查
    topk: 1

  # 高风险判定阈值：cosine similarity ≥ threshold → 标记为高风险
  # 推荐范围：0.85 ~ 0.95；数据质量要求高时使用 0.9
  threshold: 0.9

  labels:
    # Excel output 列中，寿险意图的标签值
    life: "寿险意图"
    # Excel output 列中，新增拒识的标签值（区别于已有拒识）
    new_reject: "拒识_new"

  output:
    # 高风险样本输出 Excel 路径（相对于项目根目录）
    path: "data/output/high_risk_samples.xlsx"
